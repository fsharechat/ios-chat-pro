name: ios-chat-pro
options:
  bundleIdPrefix: cn.comsince
  deploymentTarget:
    iOS: "15.0"
packages:
  IMCore:
    path: .
  # `App` needs `import WebRTC` directly (for `RTCMTLVideoView`), not just
  # transitively through `IMCall` — pinned to the same exact version as
  # `Package.swift`'s `IMCall` target dependency so both resolve to one
  # checkout, not two diverging ones.
  WebRTC:
    url: https://github.com/stasel/WebRTC.git
    exactVersion: 149.0.0
targets:
  App:
    type: application
    platform: iOS
    sources:
      - App
    info:
      path: App/Info.plist
      properties:
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations:
            UIWindowSceneSessionRoleApplication:
              - UISceneConfigurationName: Default Configuration
                UISceneDelegateClassName: $(PRODUCT_MODULE_NAME).SceneDelegate
        # Phase 1 dev convenience: chat-server-pro's local deployment runs on
        # plain HTTP (see this plan's "Reference facts"). Tighten this to a
        # scoped NSExceptionDomains entry (or remove it entirely) once this
        # app only ever talks to the HTTPS production host — tracked in this
        # plan's self-review notes, not forgotten.
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        NSCameraUsageDescription: "视频通话需要使用摄像头"
        NSMicrophoneUsageDescription: "语音/视频通话需要使用麦克风"
        NSLocationWhenInUseUsageDescription: "需要获取您的位置以发送位置消息"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: cn.comsince.fschat
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: S9PWD6X38T
    dependencies:
      - package: IMCore
        product: IMClient
      - package: IMCore
        product: IMStorage
      - package: IMCore
        product: IMMessaging
      - package: IMCore
        product: AppCore
      - package: IMCore
        product: IMKit
      - package: IMCore
        product: IMCall
      - package: WebRTC
        product: WebRTC
schemes:
  App:
    build:
      targets:
        App: all
    run:
      config: Debug
